# Local services for redcell. Qdrant backs the RAG knowledge base.
#   docker compose up -d qdrant
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: redcell-qdrant
    ports:
      - "6333:6333"   # REST/HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
