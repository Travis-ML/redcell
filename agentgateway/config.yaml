# AgentGateway config — launched by `uv run redcell serve`.
# Aggregates the MCP servers below behind one endpoint on :3030 (UI on :15000).
# You own this file: add policies / auth / observability here for the
# AI-security tools (Garak, Promptfoo, llm-guard) to exercise.
binds:
- port: 3030
  listeners:
  - routes:
    - policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
          exposeHeaders:
          - "Mcp-Session-Id"
      backends:
      - mcp:
          targets:
          - name: playwright
            stdio:
              cmd: npx
              args: ["-y", "@playwright/mcp@latest"]
          # Filesystem ops — read/write/edit/list — CONFINED to the same Debian
          # VM over SSH, scoped to a sandbox dir there, so file operations share
          # the contained environment with `shell` below. The path is on the VM.
          - name: filesystem
            stdio:
              cmd: ssh
              args: ["-T", "-o", "BatchMode=yes", "debian-agent", "/home/redcell/.npm-global/bin/mcp-server-filesystem", "/home/redcell/sandbox"]
          - name: fetch
            stdio:
              cmd: uvx
              args: ["mcp-server-fetch"]
          # RAG over a self-hosted Qdrant vector DB via the official MCP server.
          # Local FastEmbed embeddings; auto-creates the collection. Exposes
          # qdrant-store (write/poison surface) + qdrant-find (retrieval =
          # indirect-injection vector). Env is set via the `env` wrapper so it
          # works regardless of gateway env support.
          - name: rag
            stdio:
              cmd: env
              args:
                - "QDRANT_URL=http://localhost:6333"
                - "COLLECTION_NAME=redcell-kb"
                - "EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2"
                - "uvx"
                - "mcp-server-qdrant"
          # Command/script execution — run_command, run_script — CONFINED to a
          # dedicated VM over SSH: the server runs there, so commands can only
          # ever execute there, never on the gateway host. The 'debian-agent' SSH
          # host alias (IP / user / key) lives in the operator's local
          # ~/.ssh/config and is intentionally kept out of this repo. Harden the
          # VM: host-only/NAT networking, non-root user, snapshot-before-use.
          - name: shell
            stdio:
              cmd: ssh
              args: ["-T", "-o", "BatchMode=yes", "debian-agent", "/home/redcell/.npm-global/bin/mcp-server-commands"]
